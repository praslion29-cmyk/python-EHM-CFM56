
<html>
<head>
<title>Aircraft Engine Monitoring</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 30px;
    background-color: #f4f4f4;
}
h1 {
    color: #003366;
}
p {
    font-size: 18px;
}
.status-normal { color: green; }
.status-approaching { color: orange; }
.status-warning { color: red; }
.box {
    background-color: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 10px;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
}
</style>
</head>
<body>
<h1>Aircraft Engine Health Monitoring</h1>

<div class="box">
<p>Aircraft : B737-800</p>

<p>EGT : 650 °C - <span class="status-normal">Normal 🟢</span></p>
<p>N1 : 97 % - <span class="status-approaching">Approaching Limit 🟡</span></p>
<p>N2 : 98 % - <span class="status-approaching">Approaching Limit 🟡</span></p>
<p>Oil Pressure : 45 PSI - <span class="status-normal">Normal 🟢</span></p>
<p>Oil Temperature : 140 °C - <span class="status-normal">Normal 🟢</span></p>
<p>Vibration : 1.5 - <span class="status-normal">Normal 🟢</span></p>
<p>Fuel Flow : 4500 kg/h - <span class="status-normal">Normal 🟢</span></p>
</div>

</body>
</html>
